<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D Shooter</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0b1020;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }
    canvas {
      display: block;
      background: radial-gradient(circle at center, #111a33 0%, #090d18 70%);
      cursor: crosshair;
    }
    .hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 14px;
      border-radius: 12px;
      backdrop-filter: blur(4px);
      line-height: 1.5;
      user-select: none;
    }
    .help {
      position: fixed;
      right: 12px;
      top: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 14px;
      border-radius: 12px;
      backdrop-filter: blur(4px);
      text-align: right;
      line-height: 1.5;
      user-select: none;
    }
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.55);
      z-index: 20;
    }
    .panel {
      width: min(520px, calc(100vw - 32px));
      background: rgba(12, 18, 36, 0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.35);
      text-align: center;
    }
    .panel h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }
    .panel p {
      margin: 8px 0;
      color: rgba(255,255,255,0.88);
    }
    button {
      margin-top: 16px;
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      background: white;
      color: #111827;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="hud" id="hud"></div>
  <div class="help">
    WASD / Arrow Keys to move<br />
    Mouse to aim<br />
    Click to shoot<br />
    Shift to dash<br />
    R to restart
  </div>
  <canvas id="game"></canvas>

  <div class="overlay" id="startOverlay">
    <div class="panel">
      <h1>2D Shooter</h1>
      <p>Survive waves of enemies and keep your score climbing.</p>
      <p>Enemies chase you. You shoot toward your mouse.</p>
      <button id="startBtn">Start Game</button>
    </div>
  </div>

  <div class="overlay" id="gameOverOverlay" style="display:none;">
    <div class="panel">
      <h1>Game Over</h1>
      <p id="finalScore">Score: 0</p>
      <p id="finalWave">Wave: 1</p>
      <button id="restartBtn">Play Again</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const hud = document.getElementById('hud');
    const startOverlay = document.getElementById('startOverlay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const finalScore = document.getElementById('finalScore');
    const finalWave = document.getElementById('finalWave');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const input = {
      up: false,
      down: false,
      left: false,
      right: false,
      shoot: false,
      dash: false,
      mouseX: 0,
      mouseY: 0,
    };

    const keysDown = new Set();

    window.addEventListener('keydown', (e) => {
      keysDown.add(e.key.toLowerCase());
      if (e.key.toLowerCase() === 'r' && state.gameOver) restartGame();
    });

    window.addEventListener('keyup', (e) => {
      keysDown.delete(e.key.toLowerCase());
    });

    canvas.addEventListener('mousemove', (e) => {
      input.mouseX = e.clientX;
      input.mouseY = e.clientY;
    });
    canvas.addEventListener('mousedown', () => input.shoot = true);
    window.addEventListener('mouseup', () => input.shoot = false);

    function syncInput() {
      input.up = keysDown.has('w') || keysDown.has('arrowup');
      input.down = keysDown.has('s') || keysDown.has('arrowdown');
      input.left = keysDown.has('a') || keysDown.has('arrowleft');
      input.right = keysDown.has('d') || keysDown.has('arrowright');
      input.dash = keysDown.has('shift');
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function dist(ax, ay, bx, by) {
      return Math.hypot(ax - bx, ay - by);
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function circleCollision(a, b) {
      return dist(a.x, a.y, b.x, b.y) < a.r + b.r;
    }

    let state;

    function createState() {
      return {
        running: false,
        gameOver: false,
        time: 0,
        score: 0,
        wave: 1,
        killsThisWave: 0,
        particles: [],
        bullets: [],
        enemies: [],
        pickups: [],
        spawnTimer: 0,
        player: {
          x: canvas.width / 2,
          y: canvas.height / 2,
          r: 16,
          speed: 280,
          hp: 100,
          maxHp: 100,
          angle: 0,
          shootCooldown: 0,
          shootRate: 0.16,
          bulletSpeed: 760,
          bulletDamage: 34,
          dashCooldown: 0,
          dashTimer: 0,
          invuln: 0,
        },
      };
    }

    function resetGameObjects() {
      state = createState();
    }

    function startGame() {
      resetGameObjects();
      state.running = true;
      startOverlay.style.display = 'none';
      gameOverOverlay.style.display = 'none';
    }

    function restartGame() {
      startGame();
    }

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', restartGame);

    function spawnEnemy() {
      const edge = Math.floor(Math.random() * 4);
      let x, y;
      const margin = 50;
      if (edge === 0) { x = rand(-margin, canvas.width + margin); y = -margin; }
      else if (edge === 1) { x = canvas.width + margin; y = rand(-margin, canvas.height + margin); }
      else if (edge === 2) { x = rand(-margin, canvas.width + margin); y = canvas.height + margin; }
      else { x = -margin; y = rand(-margin, canvas.height + margin); }

      const scale = 1 + (state.wave - 1) * 0.12;
      const typeRoll = Math.random();
      let enemy;

      if (typeRoll < 0.14 + state.wave * 0.01) {
        enemy = {
          type: 'tank',
          x, y,
          r: 22,
          speed: 80 * scale,
          hp: 120 * scale,
          damage: 20,
          color: '#ff6b6b',
          hitFlash: 0,
        };
      } else if (typeRoll < 0.34) {
        enemy = {
          type: 'fast',
          x, y,
          r: 12,
          speed: 175 * scale,
          hp: 34 * scale,
          damage: 10,
          color: '#ffd166',
          hitFlash: 0,
        };
      } else {
        enemy = {
          type: 'basic',
          x, y,
          r: 16,
          speed: 115 * scale,
          hp: 58 * scale,
          damage: 14,
          color: '#7bdff2',
          hitFlash: 0,
        };
      }

      state.enemies.push(enemy);
    }

    function shootBullet() {
      const p = state.player;
      const angle = Math.atan2(input.mouseY - p.y, input.mouseX - p.x);
      p.angle = angle;
      state.bullets.push({
        x: p.x + Math.cos(angle) * (p.r + 6),
        y: p.y + Math.sin(angle) * (p.r + 6),
        vx: Math.cos(angle) * p.bulletSpeed,
        vy: Math.sin(angle) * p.bulletSpeed,
        r: 4,
        life: 1.2,
        damage: p.bulletDamage,
      });
    }

    function burst(x, y, count, speed) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * speed;
        state.particles.push({
          x,
          y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s,
          life: rand(0.2, 0.6),
          maxLife: 0.6,
          r: rand(1, 3),
        });
      }
    }

    function maybeDropPickup(x, y) {
      if (Math.random() < 0.13) {
        state.pickups.push({
          x,
          y,
          r: 10,
          kind: Math.random() < 0.7 ? 'heal' : 'rapid',
          life: 10,
        });
      }
    }

    function update(dt) {
      syncInput();
      if (!state.running || state.gameOver) return;

      const p = state.player;
      state.time += dt;
      p.shootCooldown -= dt;
      p.dashCooldown -= dt;
      p.dashTimer -= dt;
      p.invuln -= dt;

      let dx = 0;
      let dy = 0;
      if (input.up) dy -= 1;
      if (input.down) dy += 1;
      if (input.left) dx -= 1;
      if (input.right) dx += 1;
      const len = Math.hypot(dx, dy) || 1;
      dx /= len;
      dy /= len;

      let moveSpeed = p.speed;
      if (input.dash && p.dashCooldown <= 0) {
        p.dashTimer = 0.12;
        p.dashCooldown = 1.2;
        p.invuln = 0.16;
      }
      if (p.dashTimer > 0) moveSpeed = 680;

      p.x += dx * moveSpeed * dt;
      p.y += dy * moveSpeed * dt;
      p.x = clamp(p.x, p.r, canvas.width - p.r);
      p.y = clamp(p.y, p.r, canvas.height - p.r);
      p.angle = Math.atan2(input.mouseY - p.y, input.mouseX - p.x);

      if (input.shoot && p.shootCooldown <= 0) {
        shootBullet();
        p.shootCooldown = p.shootRate;
      }

      const baseSpawnRate = Math.max(0.25, 1.0 - state.wave * 0.06);
      state.spawnTimer -= dt;
      if (state.spawnTimer <= 0) {
        spawnEnemy();
        state.spawnTimer = rand(baseSpawnRate * 0.65, baseSpawnRate * 1.15);
      }

      for (let i = state.bullets.length - 1; i >= 0; i--) {
        const b = state.bullets[i];
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.life -= dt;
        if (
          b.life <= 0 ||
          b.x < -20 || b.x > canvas.width + 20 ||
          b.y < -20 || b.y > canvas.height + 20
        ) {
          state.bullets.splice(i, 1);
        }
      }

      for (let i = state.enemies.length - 1; i >= 0; i--) {
        const e = state.enemies[i];
        e.hitFlash -= dt;
        const ang = Math.atan2(p.y - e.y, p.x - e.x);
        e.x += Math.cos(ang) * e.speed * dt;
        e.y += Math.sin(ang) * e.speed * dt;

        for (let j = state.bullets.length - 1; j >= 0; j--) {
          const b = state.bullets[j];
          if (circleCollision(e, b)) {
            e.hp -= b.damage;
            e.hitFlash = 0.08;
            burst(b.x, b.y, 5, 90);
            state.bullets.splice(j, 1);
            if (e.hp <= 0) {
              burst(e.x, e.y, 18, 150);
              maybeDropPickup(e.x, e.y);
              const points = e.type === 'tank' ? 30 : e.type === 'fast' ? 15 : 20;
              state.score += points;
              state.killsThisWave += 1;
              state.enemies.splice(i, 1);
              break;
            }
          }
        }
      }

      for (let i = state.enemies.length - 1; i >= 0; i--) {
        const e = state.enemies[i];
        if (circleCollision(e, p) && p.invuln <= 0) {
          p.hp -= e.damage;
          p.invuln = 0.5;
          const ang = Math.atan2(p.y - e.y, p.x - e.x);
          p.x += Math.cos(ang) * 28;
          p.y += Math.sin(ang) * 28;
          burst(p.x, p.y, 12, 160);
          if (p.hp <= 0) {
            p.hp = 0;
            state.gameOver = true;
            state.running = false;
            finalScore.textContent = `Score: ${state.score}`;
            finalWave.textContent = `Wave: ${state.wave}`;
            gameOverOverlay.style.display = 'flex';
            return;
          }
        }
      }

      for (let i = state.pickups.length - 1; i >= 0; i--) {
        const item = state.pickups[i];
        item.life -= dt;
        if (item.life <= 0) {
          state.pickups.splice(i, 1);
          continue;
        }
        if (circleCollision(item, p)) {
          if (item.kind === 'heal') {
            p.hp = Math.min(p.maxHp, p.hp + 22);
          } else {
            p.shootRate = Math.max(0.08, p.shootRate - 0.015);
          }
          burst(item.x, item.y, 14, 140);
          state.pickups.splice(i, 1);
        }
      }

      for (let i = state.particles.length - 1; i >= 0; i--) {
        const pt = state.particles[i];
        pt.x += pt.vx * dt;
        pt.y += pt.vy * dt;
        pt.vx *= 0.98;
        pt.vy *= 0.98;
        pt.life -= dt;
        if (pt.life <= 0) state.particles.splice(i, 1);
      }

      const waveThreshold = 10 + (state.wave - 1) * 6;
      if (state.killsThisWave >= waveThreshold) {
        state.wave += 1;
        state.killsThisWave = 0;
      }

      hud.innerHTML = `
        <strong>Score:</strong> ${state.score}<br>
        <strong>Wave:</strong> ${state.wave}<br>
        <strong>Health:</strong> ${Math.ceil(p.hp)} / ${p.maxHp}<br>
        <strong>Fire Rate:</strong> ${p.shootRate.toFixed(2)}s<br>
        <strong>Dash:</strong> ${p.dashCooldown > 0 ? p.dashCooldown.toFixed(1) + 's' : 'Ready'}
      `;
    }

    function drawGrid() {
      const gap = 48;
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      for (let x = 0; x < canvas.width; x += gap) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += gap) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawPlayer() {
      const p = state.player;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);

      if (p.invuln > 0) {
        ctx.globalAlpha = 0.6 + Math.sin(performance.now() * 0.03) * 0.2;
      }

      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(0, 0, p.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#58a6ff';
      ctx.fillRect(0, -5, p.r + 16, 10);

      ctx.fillStyle = '#0b1020';
      ctx.beginPath();
      ctx.arc(5, -4, 2.5, 0, Math.PI * 2);
      ctx.arc(5, 4, 2.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawEnemies() {
      for (const e of state.enemies) {
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.fillStyle = e.hitFlash > 0 ? '#ffffff' : e.color;
        ctx.beginPath();
        ctx.arc(0, 0, e.r, 0, Math.PI * 2);
        ctx.fill();

        const hpW = e.r * 2;
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillRect(-e.r, -e.r - 12, hpW, 5);
        ctx.fillStyle = '#7CFC84';
        const maxHp = e.type === 'tank' ? 120 * (1 + (state.wave - 1) * 0.12)
                     : e.type === 'fast' ? 34 * (1 + (state.wave - 1) * 0.12)
                     : 58 * (1 + (state.wave - 1) * 0.12);
        ctx.fillRect(-e.r, -e.r - 12, hpW * Math.max(0, e.hp / maxHp), 5);
        ctx.restore();
      }
    }

    function drawBullets() {
      ctx.fillStyle = '#ffffff';
      for (const b of state.bullets) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawPickups() {
      for (const item of state.pickups) {
        ctx.save();
        ctx.translate(item.x, item.y);
        ctx.fillStyle = item.kind === 'heal' ? '#7CFC84' : '#ffd166';
        ctx.beginPath();
        ctx.arc(0, 0, item.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#111827';
        if (item.kind === 'heal') {
          ctx.fillRect(-2, -6, 4, 12);
          ctx.fillRect(-6, -2, 12, 4);
        } else {
          ctx.fillRect(-5, -2, 10, 4);
          ctx.fillRect(1, -6, 4, 12);
        }
        ctx.restore();
      }
    }

    function drawParticles() {
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      for (const pt of state.particles) {
        ctx.globalAlpha = Math.max(0, pt.life / pt.maxLife);
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawCrosshair() {
      const x = input.mouseX;
      const y = input.mouseY;
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y, 10, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x - 16, y);
      ctx.lineTo(x - 6, y);
      ctx.moveTo(x + 6, y);
      ctx.lineTo(x + 16, y);
      ctx.moveTo(x, y - 16);
      ctx.lineTo(x, y - 6);
      ctx.moveTo(x, y + 6);
      ctx.lineTo(x, y + 16);
      ctx.stroke();
      ctx.restore();
    }

    function drawHealthBar() {
      const p = state.player;
      const w = 220;
      const h = 18;
      const x = 12;
      const y = canvas.height - 34;
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = '#7CFC84';
      ctx.fillRect(x, y, w * (p.hp / p.maxHp), h);
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.strokeRect(x, y, w, h);
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();

      if (state) {
        drawPickups();
        drawBullets();
        drawEnemies();
        drawParticles();
        drawPlayer();
        drawHealthBar();
      }

      drawCrosshair();
    }

    let last = performance.now();
    resetGameObjects();
    hud.innerHTML = 'Press Start';

    function loop(now) {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
